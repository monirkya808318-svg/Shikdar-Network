<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>শিকদার নেটওয়ার্ক</title>

<!-- PWA / Installable app metadata -->
<meta name="theme-color" content="#0D3B36" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="শিকদার নেটওয়ার্ক" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="icon" href="icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@500;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body { margin: 0; }
  .receipt-edge {
    background-image: radial-gradient(circle at 10px 0, transparent 6px, #F6F1E4 6.5px);
    background-size: 20px 12px;
    background-repeat: repeat-x;
    background-position: top;
    height: 12px;
    margin-top: -1px;
  }
  .perf {
    border-top: 2px dashed #D8CBA6;
    position: relative;
    margin: 12px 0;
  }
  .perf::before, .perf::after {
    content: '';
    position: absolute;
    top: -7px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #F6F1E4;
    border: 2px solid #E4DCC4;
  }
  .perf::before { left: -20px; }
  .perf::after { right: -20px; }
  button { font-family: inherit; cursor: pointer; }
  input, textarea { font-family: inherit; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ---- simple inline icon set (replaces lucide-react so the app works fully offline) ---- */
function Icon({ children, size = 16, color = "currentColor", style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
         strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
      {children}
    </svg>
  );
}
const Search = p => <Icon {...p}><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></Icon>;
const Plus = p => <Icon {...p}><path d="M12 5v14M5 12h14" /></Icon>;
const Phone = p => <Icon {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" /></Icon>;
const Wifi = p => <Icon {...p}><path d="M5 13a10 10 0 0 1 14 0" /><path d="M8.5 16.5a5 5 0 0 1 7 0" /><path d="M2 8.82a15 15 0 0 1 20 0" /><line x1="12" y1="20" x2="12.01" y2="20" /></Icon>;
const Check = p => <Icon {...p}><path d="M20 6 9 17l-5-5" /></Icon>;
const X = p => <Icon {...p}><path d="M18 6 6 18M6 6l12 12" /></Icon>;
const Edit2 = p => <Icon {...p}><path d="m18 2 4 4-14 14H4v-4z" /></Icon>;
const Trash2 = p => <Icon {...p}><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6" /></Icon>;
const ChevronLeft = p => <Icon {...p}><path d="m15 18-6-6 6-6" /></Icon>;
const ChevronRight = p => <Icon {...p}><path d="m9 18 6-6-6-6" /></Icon>;
const Users = p => <Icon {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" /></Icon>;
const Wallet = p => <Icon {...p}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" /><path d="M3 5v14a2 2 0 0 0 2 2h16v-5" /><path d="M18 12a2 2 0 0 0 0 4h4v-4z" /></Icon>;
const Clock = p => <Icon {...p}><circle cx="12" cy="12" r="10" /><path d="M12 6v6l4 2" /></Icon>;
const MapPin = p => <Icon {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></Icon>;
const Upload = p => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><path d="M17 8l-5-5-5 5" /><path d="M12 3v12" /></Icon>;

/* ---- helpers ---- */
const BN_MONTHS = ["জানুয়ারি","ফেব্রুয়ারি","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টেম্বর","অক্টোবর","নভেম্বর","ডিসেম্বর"];

function bnDigits(n) {
  const map = ["০","১","২","৩","৪","৫","৬","৭","৮","৯"];
  return String(n).replace(/[0-9]/g, d => map[d]);
}
function taka(n) {
  return "৳" + bnDigits(Number(n || 0).toLocaleString("en-US"));
}
function monthKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

/* ---- storage: uses localStorage so data persists on this device/browser ---- */
const storage = {
  get(key) {
    try {
      const v = localStorage.getItem(key);
      return v === null ? null : JSON.parse(v);
    } catch { return null; }
  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  },
};

const SEED_CUSTOMERS = [
  { id: uid(), name: "রফিকুল ইসলাম", phone: "01712-345678", address: "বাড়ি-১২, রোড-৩, বনশ্রী", package: "১০ Mbps", amount: 600, joinDate: "2024-03-01", active: true },
  { id: uid(), name: "সালমা বেগম", phone: "01823-456789", address: "বাড়ি-৭, রামপুরা", package: "২০ Mbps", amount: 900, joinDate: "2023-11-15", active: true },
  { id: uid(), name: "আব্দুল করিম", phone: "01934-567890", address: "মেরুল বাড্ডা", package: "৫ Mbps", amount: 450, joinDate: "2024-06-01", active: true },
];

function App() {
  const [customers, setCustomers] = useState(null);
  const [payments, setPayments] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [month, setMonth] = useState(new Date());
  const [query, setQuery] = useState("");
  const [filter, setFilter] = useState("all");
  const [modal, setModal] = useState(null);
  const [collectFor, setCollectFor] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [toast, setToast] = useState(null);
  const fileInputRef = useRef(null);

  useEffect(() => {
    const c = storage.get("customers");
    setCustomers(c || SEED_CUSTOMERS);
    const p = storage.get("payments");
    setPayments(p || {});
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (loaded && customers) storage.set("customers", customers);
  }, [customers, loaded]);

  useEffect(() => {
    if (loaded && payments) storage.set("payments", payments);
  }, [payments, loaded]);

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  }

  const mk = monthKey(month);

  const rows = useMemo(() => {
    if (!customers) return [];
    return customers
      .filter(c => c.active)
      .map(c => {
        const rec = payments?.[`${c.id}-${mk}`];
        return { ...c, paid: !!rec?.paid, paidDate: rec?.date };
      })
      .filter(c => {
        if (filter === "due" && c.paid) return false;
        if (filter === "paid" && !c.paid) return false;
        if (query.trim()) {
          const q = query.trim().toLowerCase();
          return c.name.toLowerCase().includes(q) || c.phone.includes(q);
        }
        return true;
      })
      .sort((a, b) => (a.paid === b.paid ? a.name.localeCompare(b.name, "bn") : a.paid ? 1 : -1));
  }, [customers, payments, mk, filter, query]);

  const stats = useMemo(() => {
    if (!customers) return { total: 0, collected: 0, due: 0, dueCount: 0 };
    const active = customers.filter(c => c.active);
    let collected = 0, due = 0, dueCount = 0;
    active.forEach(c => {
      const rec = payments?.[`${c.id}-${mk}`];
      if (rec?.paid) collected += Number(c.amount);
      else { due += Number(c.amount); dueCount++; }
    });
    return { total: active.length, collected, due, dueCount };
  }, [customers, payments, mk]);

  function changeMonth(delta) {
    const d = new Date(month);
    d.setMonth(d.getMonth() + delta);
    setMonth(d);
  }

  function collectPayment(customer, amount) {
    setPayments(prev => ({
      ...prev,
      [`${customer.id}-${mk}`]: { paid: true, date: new Date().toISOString(), amount },
    }));
    setCollectFor(null);
    showToast(`${customer.name} — ${taka(amount)} আদায় হয়েছে`);
  }

  function undoPayment(customer) {
    setPayments(prev => {
      const next = { ...prev };
      delete next[`${customer.id}-${mk}`];
      return next;
    });
  }

  function saveCustomer(data) {
    if (data.id) {
      setCustomers(prev => prev.map(c => (c.id === data.id ? { ...c, ...data } : c)));
      showToast("গ্রাহকের তথ্য হালনাগাদ হয়েছে");
    } else {
      setCustomers(prev => [...prev, { ...data, id: uid(), active: true }]);
      showToast("নতুন গ্রাহক যুক্ত হয়েছে");
    }
    setModal(null);
  }

  function deleteCustomer(id) {
    setCustomers(prev => prev.map(c => (c.id === id ? { ...c, active: false } : c)));
    setConfirmDelete(null);
    showToast("গ্রাহক সরানো হয়েছে");
  }

  /* ---- NEW: bulk import customers from an Excel (.xlsx/.xls) file ----
     Expected columns (Bangla or English header names both work):
     নাম/Name, ফোন/Phone, ঠিকানা/Address, প্যাকেজ/Package, বিল/Amount
  */
  function importFromExcel(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = new Uint8Array(evt.target.result);
        const wb = XLSX.read(data, { type: "array" });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rowsData = XLSX.utils.sheet_to_json(sheet, { defval: "" });

        const newCustomers = rowsData
          .map(r => ({
            id: uid(),
            name: String(r["নাম"] || r["Name"] || r["name"] || "").trim(),
            phone: String(r["ফোন"] || r["Phone"] || r["phone"] || r["ফোন নম্বর"] || "").trim(),
            address: String(r["ঠিকানা"] || r["Address"] || r["address"] || "").trim(),
            package: String(r["প্যাকেজ"] || r["Package"] || r["package"] || "").trim(),
            amount: Number(r["বিল"] || r["Amount"] || r["amount"] || r["মাসিক বিল"] || 0),
            joinDate: new Date().toISOString().slice(0, 10),
            active: true,
          }))
          .filter(c => c.name && c.phone);

        if (newCustomers.length === 0) {
          showToast("এক্সেল ফাইলে সঠিক তথ্য পাওয়া যায়নি");
          return;
        }

        setCustomers(prev => [...(prev || []), ...newCustomers]);
        showToast(`${bnDigits(newCustomers.length)} জন গ্রাহক যুক্ত হয়েছে`);
      } catch (err) {
        showToast("ফাইল পড়তে সমস্যা হয়েছে, ফরম্যাট ঠিক আছে কিনা দেখুন");
      } finally {
        e.target.value = "";
      }
    };
    reader.readAsArrayBuffer(file);
  }

  if (!loaded) {
    return (
      <div style={{ minHeight: "100vh", background: "#F6F1E4", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Hind Siliguri', sans-serif", color: "#0D3B36" }}>
        লোড হচ্ছে...
      </div>
    );
  }

  const isCurrentMonth = monthKey(new Date()) === mk;

  return (
    <div style={{ minHeight: "100vh", background: "#F6F1E4", fontFamily: "'Hind Siliguri', sans-serif", color: "#1A1A16", paddingBottom: 96 }}>
      {/* Header */}
      <div style={{ background: "#0D3B36", color: "#F6F1E4", padding: "22px 18px 28px", position: "relative" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 40, height: 40, borderRadius: 10, background: "#C08A28", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <Wifi size={22} color="#0D3B36" />
          </div>
          <div>
            <div style={{ fontFamily: "'Baloo Da 2', sans-serif", fontWeight: 800, fontSize: 22, lineHeight: 1.1 }}>শিকদার নেটওয়ার্ক</div>
            <div style={{ fontSize: 13, opacity: 0.75, marginTop: 2 }}>বিল কালেকশন খাতা</div>
          </div>
        </div>

        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 20, background: "rgba(255,255,255,0.08)", borderRadius: 12, padding: "8px 6px" }}>
          <button onClick={() => changeMonth(-1)} style={{ background: "none", border: "none", color: "#F6F1E4", padding: 8 }}>
            <ChevronLeft size={20} />
          </button>
          <div style={{ fontWeight: 700, fontSize: 15 }}>
            {BN_MONTHS[month.getMonth()]} {bnDigits(month.getFullYear())}
            {isCurrentMonth && <span style={{ marginLeft: 8, fontSize: 11, background: "#C08A28", color: "#0D3B36", padding: "2px 8px", borderRadius: 20, fontWeight: 700 }}>চলতি মাস</span>}
          </div>
          <button onClick={() => changeMonth(1)} style={{ background: "none", border: "none", color: "#F6F1E4", padding: 8 }}>
            <ChevronRight size={20} />
          </button>
        </div>
      </div>
      <div className="receipt-edge" />

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, padding: "16px 18px 4px" }}>
        <StatCard icon={<Users size={16} />} label="গ্রাহক" value={bnDigits(stats.total)} color="#0D3B36" />
        <StatCard icon={<Wallet size={16} />} label="আদায়" value={taka(stats.collected)} color="#2F6844" />
        <StatCard icon={<Clock size={16} />} label={`বকেয়া (${bnDigits(stats.dueCount)})`} value={taka(stats.due)} color="#B33F2E" />
      </div>

      {/* Search + filter */}
      <div style={{ padding: "14px 18px 6px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, background: "#FFFDF7", border: "1.5px solid #E4DCC4", borderRadius: 12, padding: "9px 12px" }}>
          <Search size={16} color="#8A7F5F" />
          <input
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="নাম বা ফোন নম্বর খুঁজুন"
            style={{ border: "none", outline: "none", background: "none", flex: 1, fontSize: 14, color: "#1A1A16" }}
          />
          {query && <X size={16} color="#8A7F5F" onClick={() => setQuery("")} />}
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
          {[["all", "সব"], ["due", "বকেয়া"], ["paid", "পরিশোধিত"]].map(([key, label]) => (
            <button
              key={key}
              onClick={() => setFilter(key)}
              style={{
                padding: "6px 14px", borderRadius: 20, fontSize: 13, fontWeight: 600,
                border: filter === key ? "none" : "1.5px solid #E4DCC4",
                background: filter === key ? "#0D3B36" : "#FFFDF7",
                color: filter === key ? "#F6F1E4" : "#5A5236",
              }}
            >
              {label}
            </button>
          ))}
        </div>

        {/* NEW: Excel bulk-import button */}
        <div style={{ marginTop: 10 }}>
          <button
            onClick={() => fileInputRef.current && fileInputRef.current.click()}
            style={{
              display: "inline-flex", alignItems: "center", gap: 6,
              padding: "8px 14px", borderRadius: 20, fontSize: 13, fontWeight: 600,
              border: "1.5px solid #E4DCC4", background: "#FFFDF7", color: "#5A5236"
            }}
          >
            <Upload size={14} /> এক্সেল থেকে গ্রাহক আমদানি করুন
          </button>
          <input
            ref={fileInputRef}
            type="file"
            accept=".xlsx,.xls"
            onChange={importFromExcel}
            style={{ display: "none" }}
          />
        </div>
      </div>

      {/* Customer list */}
      <div style={{ padding: "10px 18px" }}>
        {rows.length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 20px", color: "#8A7F5F", fontSize: 14 }}>
            কোনো গ্রাহক পাওয়া যায়নি
          </div>
        )}
        {rows.map(c => (
          <div key={c.id} style={{ background: "#FFFDF7", border: "1.5px solid #E4DCC4", borderRadius: 14, padding: "14px 16px", marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 16 }}>{c.name}</div>
                <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12.5, color: "#6B6248", marginTop: 3 }}>
                  <Phone size={12} /> {c.phone}
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12.5, color: "#6B6248", marginTop: 2 }}>
                  <MapPin size={12} /> {c.address}
                </div>
                <div style={{ marginTop: 6, display: "flex", gap: 6 }}>
                  <span style={{ fontSize: 11, background: "#EFE9D6", color: "#5A5236", padding: "2px 8px", borderRadius: 6, fontWeight: 600 }}>{c.package}</span>
                </div>
              </div>
              <div style={{ display: "flex", gap: 4 }}>
                <button onClick={() => setModal({ type: "edit", customer: c })} style={{ background: "none", border: "none", padding: 6, color: "#8A7F5F" }}>
                  <Edit2 size={16} />
                </button>
                <button onClick={() => setConfirmDelete(c)} style={{ background: "none", border: "none", padding: 6, color: "#B33F2E" }}>
                  <Trash2 size={16} />
                </button>
              </div>
            </div>

            <div className="perf" />

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontFamily: "'Baloo Da 2', sans-serif", fontWeight: 700, fontSize: 18, color: "#0D3B36" }}>
                {taka(c.amount)}
              </div>
              {c.paid ? (
                <button onClick={() => undoPayment(c)} style={{ display: "flex", alignItems: "center", gap: 5, background: "#E7F1EA", color: "#2F6844", border: "none", padding: "7px 14px", borderRadius: 20, fontWeight: 700, fontSize: 13 }}>
                  <Check size={14} /> পরিশোধিত
                </button>
              ) : (
                <button onClick={() => setCollectFor(c)} style={{ background: "#C08A28", color: "#0D3B36", border: "none", padding: "7px 16px", borderRadius: 20, fontWeight: 700, fontSize: 13 }}>
                  আদায় করুন
                </button>
              )}
            </div>
          </div>
        ))}
      </div>

      {/* Add button */}
      <button
        onClick={() => setModal({ type: "add" })}
        style={{ position: "fixed", bottom: 22, right: 22, width: 54, height: 54, borderRadius: "50%", background: "#0D3B36", color: "#F6F1E4", border: "none", boxShadow: "0 6px 16px rgba(13,59,54,0.35)", display: "flex", alignItems: "center", justifyContent: "center" }}
      >
        <Plus size={24} />
      </button>

      {/* Toast */}
      {toast && (
        <div style={{ position: "fixed", bottom: 90, left: "50%", transform: "translateX(-50%)", background: "#1A1A16", color: "#F6F1E4", padding: "10px 18px", borderRadius: 10, fontSize: 13.5, boxShadow: "0 4px 14px rgba(0,0,0,0.25)", maxWidth: "85%", textAlign: "center" }}>
          {toast}
        </div>
      )}

      {/* Collect payment modal */}
      {collectFor && (
        <Overlay onClose={() => setCollectFor(null)}>
          <div style={{ fontFamily: "'Baloo Da 2', sans-serif", fontWeight: 700, fontSize: 17, marginBottom: 4 }}>বিল আদায়</div>
          <div style={{ fontSize: 13, color: "#6B6248", marginBottom: 16 }}>{collectFor.name} — {BN_MONTHS[month.getMonth()]}</div>
          <CollectForm customer={collectFor} onConfirm={amt => collectPayment(collectFor, amt)} onCancel={() => setCollectFor(null)} />
        </Overlay>
      )}

      {/* Add/Edit modal */}
      {modal && (
        <Overlay onClose={() => setModal(null)}>
          <div style={{ fontFamily: "'Baloo Da 2', sans-serif", fontWeight: 700, fontSize: 17, marginBottom: 16 }}>
            {modal.type === "add" ? "নতুন গ্রাহক" : "গ্রাহকের তথ্য সম্পাদনা"}
          </div>
          <CustomerForm initial={modal.customer} onSave={saveCustomer} onCancel={() => setModal(null)} />
        </Overlay>
      )}

      {/* Delete confirm */}
      {confirmDelete && (
        <Overlay onClose={() => setConfirmDelete(null)}>
          <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 8 }}>গ্রাহক মুছে ফেলবেন?</div>
          <div style={{ fontSize: 13.5, color: "#6B6248", marginBottom: 18 }}>{confirmDelete.name}-কে তালিকা থেকে সরানো হবে। এটি পূর্বাবস্থায় ফেরানো যাবে না।</div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => setConfirmDelete(null)} style={{ flex: 1, padding: "10px 0", borderRadius: 10, border: "1.5px solid #E4DCC4", background: "#FFFDF7", fontWeight: 600 }}>বাতিল</button>
            <button onClick={() => deleteCustomer(confirmDelete.id)} style={{ flex: 1, padding: "10px 0", borderRadius: 10, border: "none", background: "#B33F2E", color: "#fff", fontWeight: 700 }}>মুছে ফেলুন</button>
          </div>
        </Overlay>
      )}
    </div>
  );
}

function StatCard({ icon, label, value, color }) {
  return (
    <div style={{ background: "#FFFDF7", border: "1.5px solid #E4DCC4", borderRadius: 12, padding: "10px 10px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 5, color, fontSize: 11.5, fontWeight: 600 }}>
        {icon} {label}
      </div>
      <div style={{ fontFamily: "'Baloo Da 2', sans-serif", fontWeight: 700, fontSize: 15.5, marginTop: 4, color: "#1A1A16" }}>{value}</div>
    </div>
  );
}

function Overlay({ children, onClose }) {
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(13,25,22,0.45)", display: "flex", alignItems: "flex-end", zIndex: 50 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#F6F1E4", width: "100%", borderRadius: "20px 20px 0 0", padding: "20px 20px 26px", maxHeight: "85vh", overflowY: "auto" }}>
        {children}
      </div>
    </div>
  );
}

function CollectForm({ customer, onConfirm, onCancel }) {
  const [amount, setAmount] = useState(String(customer.amount));
  return (
    <div>
      <label style={{ fontSize: 13, fontWeight: 600, color: "#5A5236" }}>পরিমাণ (৳)</label>
      <input
        type="number"
        value={amount}
        onChange={e => setAmount(e.target.value)}
        style={{ width: "100%", padding: "10px 12px", marginTop: 6, marginBottom: 16, borderRadius: 10, border: "1.5px solid #E4DCC4", fontSize: 15, background: "#FFFDF7" }}
      />
      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={onCancel} style={{ flex: 1, padding: "11px 0", borderRadius: 10, border: "1.5px solid #E4DCC4", background: "#FFFDF7", fontWeight: 600 }}>বাতিল</button>
        <button
          onClick={() => amount && Number(amount) > 0 && onConfirm(Number(amount))}
          style={{ flex: 1.5, padding: "11px 0", borderRadius: 10, border: "none", background: "#C08A28", color: "#0D3B36", fontWeight: 700 }}
        >
          আদায় নিশ্চিত করুন
        </button>
      </div>
    </div>
  );
}

function CustomerForm({ initial, onSave, onCancel }) {
  const [form, setForm] = useState(
    initial || { name: "", phone: "", address: "", package: "", amount: "", joinDate: new Date().toISOString().slice(0, 10) }
  );
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const valid = form.name.trim() && form.phone.trim() && form.amount;

  const field = (label, key, type = "text") => (
    <div style={{ marginBottom: 12 }}>
      <label style={{ fontSize: 13, fontWeight: 600, color: "#5A5236" }}>{label}</label>
      <input
        type={type}
        value={form[key]}
        onChange={e => set(key, e.target.value)}
        style={{ width: "100%", padding: "10px 12px", marginTop: 6, borderRadius: 10, border: "1.5px solid #E4DCC4", fontSize: 14.5, background: "#FFFDF7" }}
      />
    </div>
  );

  return (
    <div>
      {field("নাম", "name")}
      {field("ফোন নম্বর", "phone")}
      {field("ঠিকানা", "address")}
      {field("প্যাকেজ (যেমন: ১০ Mbps)", "package")}
      {field("মাসিক বিল (৳)", "amount", "number")}
      <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
        <button onClick={onCancel} style={{ flex: 1, padding: "11px 0", borderRadius: 10, border: "1.5px solid #E4DCC4", background: "#FFFDF7", fontWeight: 600 }}>বাতিল</button>
        <button
          disabled={!valid}
          onClick={() => onSave({ ...form, id: initial?.id, amount: Number(form.amount) })}
          style={{ flex: 1.5, padding: "11px 0", borderRadius: 10, border: "none", background: valid ? "#0D3B36" : "#C9C2A5", color: "#F6F1E4", fontWeight: 700 }}
        >
          সংরক্ষণ করুন
        </button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
